name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the Pages deployment action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      # node 24 ships npm 11, matching the committed package-lock.json.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Headers for a transitive native module (`usb`, via the kit's Trezor
      # transport). Prebuilt binaries usually cover linux-x64, but install the
      # libs so a source build can't break the deploy.
      - name: System libs for native modules
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev libudev-dev

      - name: Install dependencies
        run: npm ci

      # Project Pages are served from /<repo>/. User/org pages
      # (<user>.github.io) are served from the root.
      - name: Derive base path
        id: bp
        run: |
          REPO="${{ github.event.repository.name }}"
          if [[ "$REPO" == *.github.io ]]; then
            echo "path=" >> "$GITHUB_OUTPUT"
          else
            echo "path=/$REPO" >> "$GITHUB_OUTPUT"
          fi

      - name: Build static export
        env:
          NEXT_OUTPUT: export
          NEXT_PUBLIC_BASE_PATH: ${{ steps.bp.outputs.path }}
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (Actions source) on the first run so no manual
          # Settings toggle is needed.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
